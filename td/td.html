<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tower Defense</title>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
    .game-container {
      position: relative;
      width: 800px;
      height: 400px;
      margin: 0 auto;
      background-color: #ddeeff;
    }
    .path {
      position: absolute;
      width: 700px;
      height: 20px;
      top: 190px;
      left: 50px;
      background-color: #885522;
    }
    .tower {
      width: 30px;
      height: 30px;
      background-color: gray;
      border-radius: 50%;
      position: absolute;
    }
    .balloon {
      width: 20px;
      height: 20px;
      background-color: red;
      border-radius: 50%;
      position: absolute;
      animation: moveBalloon 10s linear infinite;
    }
    @keyframes moveBalloon {
      0% { left: 0; }
      100% { left: 700px; }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="path"></div>
  </div>
  
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const gameContainer = document.querySelector(".game-container");

      function createTower(x, y) {
        const tower = document.createElement("div");
        tower.className = "tower";
        tower.style.left = `${x}px`;
        tower.style.top = `${y}px`;
        gameContainer.appendChild(tower);
      }

      function createBalloon() {
        const balloon = document.createElement("div");
        balloon.className = "balloon";
        gameContainer.appendChild(balloon);
      }

      gameContainer.addEventListener("click", function(event) {
        createTower(event.clientX - 15, event.clientY - 15);
      });

      setInterval(createBalloon, 2000);
    });
  </script>
</body>
</html>
