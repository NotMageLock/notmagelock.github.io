<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote Submission</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 300px;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 10px;
            font-size: 16px;
            color: #555;
        }
        select, button {
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
        #message {
            margin-top: 20px;
            font-size: 16px;
            color: #007BFF;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vote for a leader:</h1>
        <form id="voteForm">
            <label for="options">Choose an option:</label>
            <select id="options" name="options">
                <option value="Sticker">Sticker</option>
                <option value="Lock">Lock</option>
                <option value="Pizza">Pizza</option>
                <option value="Gold">Gold</option>
                <option value="Scream">Scream</option>
                <option value="Chunka">Chunka</option>
                <option value="Greyaster">Greyaster</option>
                <option value="Mad">Mad</option>
                <option value="Plague">Plague</option>
                <option value="Leo">Leo</option>
                <option value="Willow">Willow</option>
                <option value="stxrzy">stxrzy</option>
            </select>
            <button type="submit">Submit Vote</button>
        </form>
        <p id="message"></p>
    </div>

    <script>
        const votingStartDate = new Date('2024-08-04');

        document.getElementById('voteForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const currentDate = new Date();
            const votedDate = new Date(localStorage.getItem('votedDate'));

            if (votedDate >= votingStartDate && votedDate < currentDate) {
                const selectedOption = document.getElementById('options').value;
                const webhookUrl = 'https://discord.com/api/webhooks/1269823482506641509/uXVF9nnIaDKmBa_dZgjriBJdl7iAbS13UCXvDGPxShU8xOLPI3OVTy9rGvNta5l8aWOC';

                const data = {
                    content: selectedOption
                };

                fetch(webhookUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                })
                .then(response => response.json())
                .then(result => {
                    localStorage.setItem('votedDate', currentDate);
                    localStorage.setItem('votedOption', selectedOption);
                    document.getElementById('message').innerText = 'Vote submitted successfully!';
                    console.log('Success:', result);
                })
                .catch(error => {
                    document.getElementById('message').innerText = 'Error submitting vote.';
                    console.error('Error:', error);
                });
            } else if (votedDate < votingStartDate || !localStorage.getItem('votedDate')) {
                const selectedOption = document.getElementById('options').value;
                const webhookUrl = 'https://discord.com/api/webhooks/1269823482506641509/uXVF9nnIaDKmBa_dZgjriBJdl7iAbS13UCXvDGPxShU8xOLPI3OVTy9rGvNta5l8aWOC';

                const data = {
                    content: selectedOption
                };

                fetch(webhookUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                })
                .then(response => response.json())
                .then(result => {
                    localStorage.setItem('votedDate', currentDate);
                    localStorage.setItem('votedOption', selectedOption);
                    document.getElementById('message').innerText = 'Vote submitted successfully!';
                    console.log('Success:', result);
                })
                .catch(error => {
                    document.getElementById('message').innerText = 'Error submitting vote.';
                    console.error('Error:', error);
                });
            } else {
                document.getElementById('message').innerText = 'You have already voted for this cycle.';
            }
        });
    </script>
</body>
</html>
