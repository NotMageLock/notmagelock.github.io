<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A pretty scuffed platformer</title></title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f0f0f0;
    }
    .player {
      width: 30px;
      height: 30px;
      background-color: purple;
      border: 2px solid black;
      position: absolute;
      bottom: 0;
    }
    .platform {
      width: 100px;
      height: 10px;
      background-color: white;
      border: 1px solid black;
      position: absolute;
    }
    .level1 {
      left: 50px;
      bottom: 50px;
    }
    /* Add more levels with increasing difficulty */
    /* For example:
    .level2 {
      left: 200px;
      bottom: 100px;
    }
    */
  </style>
</head>
<body>
  <div class="player"></div>
  <div class="platform level1"></div>
  <!-- Add more platforms for each level -->
  <!-- For example:
  <div class="platform level2"></div>
  -->
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const player = document.querySelector(".player");
      const platforms = document.querySelectorAll(".platform");

      let currentLevel = 1;

      function movePlayer(e) {
        if (e.key === "ArrowRight") {
          player.style.left = `${parseInt(player.style.left || 0) + 10}px`;
        } else if (e.key === "ArrowLeft") {
          player.style.left = `${parseInt(player.style.left || 0) - 10}px`;
        }
      }

      document.addEventListener("keydown", movePlayer);

      function checkCollision() {
        platforms.forEach(platform => {
          if (
            player.offsetLeft < platform.offsetLeft + platform.offsetWidth &&
            player.offsetLeft + player.offsetWidth > platform.offsetLeft &&
            player.offsetTop < platform.offsetTop + platform.offsetHeight &&
            player.offsetTop + player.offsetHeight > platform.offsetTop
          ) {
            if (platform.classList.contains(`level${currentLevel}`)) {
              currentLevel++;
              if (currentLevel <= 10) {
                alert(`Level ${currentLevel}`);
                player.style.left = "0";
                player.style.bottom = "0";
              } else {
                alert("Congratulations! You completed all levels.");
                document.removeEventListener("keydown", movePlayer);
              }
            }
          }
        });
      }

      setInterval(checkCollision, 100);
    });
  </script>
</body>
</html>
