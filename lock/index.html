<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Uploader</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 50px; }
        #uploadForm, #login { display: none; }
    </style>
</head>
<body>
    <div id="login">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username"><br><br>
        <input type="password" id="password" placeholder="Password"><br><br>
        <button onclick="login()">Login</button>
    </div>

    <div id="uploadForm">
        <h2>Upload a File</h2>
        <input type="file" id="fileInput"><br><br>
        <button onclick="uploadFile()">Upload</button>
        <p id="status"></p>
    </div>

    <script>
        const USERNAME = "GITHUB_SECRET_LOCKUSR";
        const PASSWORD = "GITHUB_SECRET_LOCKPW";
        const WEBHOOK_URL = "GITHUB_SECRET_LWH";

        document.getElementById("login").style.display = "block";

        function login() {
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;

            if (user === USERNAME && pass === PASSWORD) {
                document.getElementById("login").style.display = "none";
                document.getElementById("uploadForm").style.display = "block";
            } else {
                alert("Invalid credentials!");
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById("fileInput");
            if (!fileInput.files.length) return alert("Select a file first!");

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append("file", file);

            try {
                await fetch(WEBHOOK_URL, { method: "POST", body: formData });
                document.getElementById("status").innerText = "File uploaded!";
            } catch (error) {
                document.getElementById("status").innerText = "Upload failed.";
            }
        }
    </script>
</body>
</html>
