<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mods - MageLock's Site</title>
    <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Londrina+Solid:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Londrina Solid', sans-serif;
            margin: 0;
            padding: 0;
            color: #fff;
            background-color: #1c1c1c;
            overflow: hidden;
        }

        .sidebar {
            height: 100%;
            width: 250px;
            position: fixed;
            top: 0;
            left: -250px;
            background-color: #333;
            color: white;
            overflow-x: hidden;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
            z-index: 1;
        }

        .sidebar a {
            padding: 15px;
            display: block;
            color: white;
            text-decoration: none;
            width: 100%;
            text-align: center;
            border-bottom: 1px solid #444;
            box-sizing: border-box;
        }

        .sidebar a:hover {
            background-color: #575757;
        }

        .sidebar.open {
            left: 0;
        }

        .openbtn {
            font-size: 20px;
            cursor: pointer;
            color: white;
            border: none;
            padding: 10px;
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 2;
            background: none;
            box-shadow: none;
            transition: left 0.3s ease, top 0.3s ease;
        }

        .sidebar.open ~ .openbtn {
            position: absolute;
            top: 10px;
            left: calc(100% - 250px + 10px); /* Adjusted for sidebar width */
        }

        main {
            padding: 20px;
            text-align: center;
            margin-left: 0;
            transition: margin-left 0.3s ease;
        }

        .sidebar.open ~ main {
            margin-left: 250px;
        }

        .mod-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .mod-item {
            position: relative;
            width: 350px;
            height: 200px;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .mod-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .mod-item:hover {
            transform: scale(1.1);
        }

        .mod-item:hover .hover-image {
            display: block;
        }

        .hover-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        @media (max-width: 768px) {
            .mod-item {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <button class="openbtn" onclick="toggleSidebar()">☰</button>
    
    <aside class="sidebar" id="mySidebar">
        <a href="/Comms/">Comms</a>
        <a href="/Links/">Links</a>
        <a href="/Games/Tetris">Games/Tetris</a>
    </aside>
    
    <main>
        <h1>Mods</h1>
        <div class="mod-container">
            <!-- Example Mod Item -->
            <a href="/Mods/GravGrongle" class="mod-item">
                <img src="/Mods/assets/gravgrongle.png" alt="GravGrongle">
                <img src="/Mods/assets/gravgrongle-hover.gif" class="hover-image" alt="GravGrongle Hover">
            </a>
            <!-- Repeat the above block for each mod -->
        </div>
    </main>
    
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('mySidebar');
            const openbtn = document.querySelector('.openbtn');
            sidebar.classList.toggle('open');
            
            if (sidebar.classList.contains('open')) {
                openbtn.style.position = 'absolute';
                openbtn.style.left = 'calc(100% - 1715px)';
                openbtn.style.top = '10px';
                document.querySelector('main').style.marginLeft = '250px';
            } else {
                openbtn.style.position = 'fixed';
                openbtn.style.left = '10px';
                openbtn.style.top = '10px';
                document.querySelector('main').style.marginLeft = '0';
            }
        }
    </script>
</body>
</html>
