<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trap-a-Mole</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        #game-board {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 5px;
        }
        .grid-cell {
            width: 100px;
            height: 100px;
            background-color: #8FBC8F;
            border: 1px solid #000;
            position: relative;
        }
        .mole {
            width: 50px;
            height: 50px;
            background-color: brown;
            border-radius: 50%;
            position: absolute;
            top: 25px;
            left: 25px;
            display: none;
        }
        .trap {
            width: 50px;
            height: 50px;
            background-color: red;
            position: absolute;
            top: 25px;
            left: 25px;
        }
        button {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<button id="start-game">Start Game</button>

<div id="game-board">
    <!-- Grid cells will be dynamically generated by JavaScript -->
</div>

<script>
    const gameBoard = document.getElementById('game-board');

    // Create the grid
    for (let i = 0; i < 16; i++) {
        const cell = document.createElement('div');
        cell.classList.add('grid-cell');
        cell.dataset.index = i;
        gameBoard.appendChild(cell);
    }

    // Add a mole
    const mole = document.createElement('div');
    mole.classList.add('mole');
    gameBoard.appendChild(mole);

    // Randomly place the mole
    function placeMole() {
        const randomIndex = Math.floor(Math.random() * 16);
        const cell = gameBoard.querySelector(`.grid-cell[data-index="${randomIndex}"]`);
        mole.style.display = 'block';
        mole.style.top = `${cell.offsetTop + 25}px`;
        mole.style.left = `${cell.offsetLeft + 25}px`;
    }

    // Handle trap placement
    gameBoard.addEventListener('click', (e) => {
        if (e.target.classList.contains('grid-cell')) {
            const trap = document.createElement('div');
            trap.classList.add('trap');
            e.target.appendChild(trap);
        }
    });

    function checkTraps() {
        const traps = document.querySelectorAll('.trap');
        traps.forEach(trap => {
            const trapCell = trap.parentElement;
            if (trapCell.contains(mole)) {
                alert('Mole caught!');
                trapCell.removeChild(trap); // Remove the trap after catching the mole
            }
        });
    }

    document.getElementById('start-game').addEventListener('click', () => {
        const traps = document.querySelectorAll('.trap');
        traps.forEach(trap => trap.remove()); // Clear traps before starting the game

        // Now, start the game loop
        setInterval(() => {
            placeMole();
            checkTraps();
        }, 2000);
    });

</script>

</body>
</html>
