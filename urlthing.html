<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Tag Generator</title>

    <!-- URL-based redirection handling -->
    <script>
        window.addEventListener('DOMContentLoaded', (event) => {
            const params = new URLSearchParams(window.location.search);
            const input = params.get('redirect');
            const customName = params.get('name') || 'Generated Meta Tag';
            const outputDiv = document.getElementById("output");

            // If URL contains a redirect, generate and display the meta tag
            if (input) {
                const metaTag = `<meta http-equiv="refresh" content="0; url=${input}">`;
                outputDiv.innerHTML = `<h2>${customName}</h2><pre>${metaTag}</pre>`;
            }
        });
    </script>
</head>
<body>
    <h1>Meta Tag and HTML Generator</h1>

    <!-- Form for input -->
    <form id="inputForm">
        <label for="htmlCode">Enter HTML Code or URL:</label><br>
        <input type="text" id="htmlCode" name="htmlCode" required><br><br>

        <label for="customName">Custom Name (optional):</label><br>
        <input type="text" id="customName" name="customName"><br><br>

        <input type="submit" value="Generate">
    </form>

    <div id="output"></div>

    <!-- Script to process input and display result -->
    <script>
        document.getElementById("inputForm").addEventListener("submit", function(event) {
            event.preventDefault();

            const input = document.getElementById("htmlCode").value;
            const customName = document.getElementById("customName").value || 'Generated Meta Tag';
            const outputDiv = document.getElementById("output");

            if (input.startsWith("http")) {
                // Generate meta tag for redirection
                const metaTag = `<meta http-equiv="refresh" content="0; url=${input}">`;
                outputDiv.innerHTML = `<h2>${customName}</h2><pre>${metaTag}</pre>`;

                // Create a sharable link with the generated content in the URL
                const sharableLink = `${window.location.origin}?redirect=${encodeURIComponent(input)}&name=${encodeURIComponent(customName)}`;
                outputDiv.innerHTML += `<p>Share this link: <a href="${sharableLink}">${sharableLink}</a></p>`;
            } else {
                // Display the HTML code entered by the user
                outputDiv.innerHTML = `<h2>${customName}</h2><pre>${input}</pre>`;
            }
        });
    </script>
</body>
</html>
