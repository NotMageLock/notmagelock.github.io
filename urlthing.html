<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Tag and HTML Generator</title>

    <!-- Handling URL parameters for redirection or HTML display -->
    <script>
        window.addEventListener('DOMContentLoaded', (event) => {
            const params = new URLSearchParams(window.location.search);
            const input = params.get('content');
            const type = params.get('type');
            const customName = params.get('name') || 'Generated Content';
            const outputDiv = document.getElementById("output");

            if (input && type) {
                if (type === "redirect") {
                    // Create a meta tag that redirects
                    const metaTag = `<meta http-equiv="refresh" content="0; url=${input}">`;
                    outputDiv.innerHTML = `<h2>${customName}</h2><pre>${metaTag}</pre>`;
                } else if (type === "html") {
                    // Display HTML content
                    outputDiv.innerHTML = `<h2>${customName}</h2><pre>${decodeURIComponent(input)}</pre>`;
                }
            }
        });
    </script>
</head>
<body>
    <h1>Meta Tag and HTML Generator</h1>

    <!-- Form for input -->
    <form id="inputForm">
        <label for="htmlCode">Enter HTML Code or URL:</label><br>
        <input type="text" id="htmlCode" name="htmlCode" required><br><br>

        <label for="customName">Custom Name (optional):</label><br>
        <input type="text" id="customName" name="customName"><br><br>

        <input type="submit" value="Generate">
    </form>

    <div id="output"></div>

    <!-- Script to process input and generate link -->
    <script>
        document.getElementById("inputForm").addEventListener("submit", function(event) {
            event.preventDefault();

            const input = document.getElementById("htmlCode").value;
            const customName = document.getElementById("customName").value || 'Generated Meta Tag';
            const outputDiv = document.getElementById("output");
            let generatedLink;

            if (input.startsWith("http")) {
                // Generate a link for redirection using URL parameters
                generatedLink = `${window.location.origin}${window.location.pathname}?content=${encodeURIComponent(input)}&type=redirect&name=${encodeURIComponent(customName)}`;
            } else {
                // Generate a link for HTML content using URL parameters
                generatedLink = `${window.location.origin}${window.location.pathname}?content=${encodeURIComponent(input)}&type=html&name=${encodeURIComponent(customName)}`;
            }

            // Display the generated link for the user
            outputDiv.innerHTML = `<p>Here’s your custom link: <a href="${generatedLink}" target="_blank">${generatedLink}</a></p>`;
        });
    </script>
</body>
</html>
