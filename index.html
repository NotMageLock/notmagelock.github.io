    <style>
      body {
        background-color:rgb(15, 15, 15);

      td {
        text-align: center;

        text-align: center;
        font-family: "Tiny5", sans-serif;
        font-weight: 400;
        font-style: normal;
        font-size: 48px;
        position: relative;
        overflow: hidden;
        background: linear-gradient(
          120deg,
          orange 0%,
          orange 40%,
          #4400ff 50%,
          orange 60%,
          orange 100%
        );

        background-size: 200% 100%;

        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;

        animation: sheen 20s linear infinite;
      }
      @keyframes sheen {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
    </style>
