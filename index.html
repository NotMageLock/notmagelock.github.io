<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MageLock's Site</title>
    <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Londrina+Solid:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Londrina Solid', sans-serif;
            margin: 0;
            padding: 0;
            color: #fff;
            background-color: #1c1c1c;
            overflow: hidden;
            transition: margin-left 0.3s ease;
        }

        .sidebar {
            height: 100%;
            width: 250px;
            position: fixed;
            top: 0;
            left: -250px;
            background-color: #333;
            color: white;
            overflow-x: hidden;
            transition: left 0.3s ease;
            font-family: 'Londrina Solid', sans-serif;
            padding-top: 60px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-end;
        }

        .sidebar a {
            padding: 15px;
            display: block;
            color: white;
            text-decoration: none;
            width: 100%;
            text-align: center;
        }

        .sidebar a:hover {
            background-color: #575757;
        }

        .sidebar.open {
            left: 0;
        }

        .openbtn {
            font-size: 20px;
            cursor: pointer;
            color: white;
            border: none;
            padding: 10px;
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 2;
            font-family: 'Londrina Solid', sans-serif;
            background: none;
            box-shadow: none;
            transition: left 0.3s ease, top 0.3s ease;
        }

        .sidebar.open ~ .openbtn {
            position: absolute;
            top: 10px;
            left: calc(100% - 1715px);
        }

        main {
            padding: 20px;
            text-align: center;
            margin-left: 0; /* Default margin-left */
            transition: margin-left 0.3s ease;
        }

        .sidebar.open ~ main {
            margin-left: 250px; /* Adjust margin when sidebar is open */
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                left: -100%;
            }

            .sidebar.open {
                left: 0;
            }

            .openbtn {
                left: 10px;
                top: 10px;
            }

            .sidebar.open ~ .openbtn {
                left: calc(100% - 50px);
            }

            main {
                margin-left: 0;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .sidebar {
                width: 33%;
                left: -33%;
            }

            .sidebar.open {
                left: 0;
            }

            .openbtn {
                left: 10px;
                top: 10px;
            }

            .sidebar.open ~ .openbtn {
                left: calc(100% - 50px);
            }

            main {
                margin-left: 0; /* Adjust margin for tablet view */
            }
        }

        @media (min-width: 1025px) {
            .sidebar {
                width: 250px;
            }
        }
    </style>
</head>
<body>
    <button class="openbtn" onclick="toggleSidebar()">☰</button>
    
    <aside class="sidebar" id="mySidebar">
        <a href="/Comms/">Comms</a>
        <a href="/Links/">Links</a>
        <a href="/Mods/">Mods</a>
        <a href="/Games/Tetris">Tetris</a>
    </aside>
    
    <main>
        <section id="home">
            <h1>Hey! I'm Lock.</h1>
            <p>I'm Lock, an intermediate C# developer with an interest in modding VR games such as Gorilla Tag using the BepInEx framework. My other hobbies and interests include 3D art, game jams, Bloons TD, content creation, and more!</p>
        </section>
    </main>
    
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('mySidebar');
            const openbtn = document.querySelector('.openbtn');
            sidebar.classList.toggle('open');
            
            if (sidebar.classList.contains('open')) {
                openbtn.style.position = 'absolute';
                openbtn.style.left = 'calc(100% - 1715px)';
                openbtn.style.top = '10px';
                document.querySelector('main').style.marginLeft = '250px';
            } else {
                openbtn.style.position = 'fixed';
                openbtn.style.left = '10px';
                openbtn.style.top = '10px';
                document.querySelector('main').style.marginLeft = '0';
            }
        }
    </script>
</body>
</html>
