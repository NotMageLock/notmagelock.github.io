<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MageLock's Site</title>
  <style>
    body {
      margin: 0;
      background-color: #222;
      font-family: monospace;
      overflow: hidden;
      color: #00ff99;
      text-shadow: 0 0 2px #00ff99, 0 0 5px #00ff99;
    }

    #snow-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -3;
    }

    #crt {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -2;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0) 0px,
        rgba(0, 0, 0, 0) 2px,
        rgba(0, 0, 0, 0.05) 3px,
        rgba(0, 0, 0, 0.05) 4px
      );
      animation: flicker 0.15s infinite;
    }

    #markdown {
      padding: 2em;
      max-width: 800px;
      margin: auto;
      white-space: pre-wrap;
      position: relative;
      z-index: 1;
      line-height: 1.4;
      transform: scaleY(0.98);
    }

    @keyframes flicker {
      0%   { opacity: 0.95; }
      50%  { opacity: 1; }
      100% { opacity: 0.97; }
    }
  </style>
</head>
<body>
  <div id="crt"></div>
  <canvas id="snow-canvas"></canvas>
  <div id="markdown">Loading...</div>

  <script>
    const canvas = document.getElementById('snow-canvas');
    const ctx = canvas.getContext('2d');
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    let flakes = [];

    function createFlakes() {
      for (let i = 0; i < 100; i++) {
        flakes.push({
          x: Math.random() * width,
          y: Math.random() * height,
          r: Math.random() * 3 + 1,
          d: Math.random() * 1 + 0.5
        });
      }
    }

    function drawFlakes() {
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "white";
      ctx.beginPath();
      for (let i = 0; i < flakes.length; i++) {
        const f = flakes[i];
        ctx.moveTo(f.x, f.y);
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2, true);
      }
      ctx.fill();
      moveFlakes();
    }

    let angle = 0;
    function moveFlakes() {
      angle += 0.01;
      for (let i = 0; i < flakes.length; i++) {
        const f = flakes[i];
        f.y += Math.pow(f.d, 2) + 1;
        f.x += Math.sin(angle) * 0.5;

        if (f.y > height) {
          flakes[i] = {
            x: Math.random() * width,
            y: 0,
            r: f.r,
            d: f.d
          };
        }
      }
    }

    createFlakes();
    setInterval(drawFlakes, 30);
    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    fetch('text.md')
      .then(response => response.text())
      .then(text => {
        const md = marked.parse(text);
        document.getElementById('markdown').innerHTML = md;
      })
      .catch(err => {
        document.getElementById('markdown').textContent = "Could not load Markdown.";
        console.error(err);
      });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
