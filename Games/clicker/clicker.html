<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clicker | MageLock's Site</title>
<style>
    body {
        font-family: 'Press Start 2P', cursive;
        text-align: center;
        background-color: #f0f0f0;
    }
    #clickArea {
        margin-top: 20px;
        font-size: 24px;
    }
    #shop {
        display: none;
        margin-top: 20px;
        font-size: 16px;
    }
    #clickButton {
        border: 2px solid black;
        border-radius: 50%;
        background-color: white;
        width: 100px;
        height: 100px;
        font-family: 'Press Start 2P', cursive;
        font-size: 16px;
    }
</style>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
</head>
<body>

<div id="clickArea">Click the button to earn points!</div>
<button id="clickButton"></button>

<div id="shop">
    <h2>Shop</h2>
    <p>Points: <span id="points">0</span></p>
    <button onclick="buyClickUpgrade()">Buy Click Upgrade (Cost: 10 points)</button>
    <button onclick="buyAutoClicker()">Buy Autoclicker (Cost: 50 points)</button>
    <button onclick="buyAutoClickUpgrade()">Buy Autoclick Upgrade (Cost: 100 points)</button>
</div>

<script>
let points = 0;
let clickMultiplier = 1;
let autoClickers = 0;
let autoClickRate = 1000; // in milliseconds

const clickButton = document.getElementById("clickButton");
const clickArea = document.getElementById("clickArea");
const pointsDisplay = document.getElementById("points");
const shop = document.getElementById("shop");

clickButton.addEventListener("click", () => {
    points += clickMultiplier;
    updatePointsDisplay();
});

function updatePointsDisplay() {
    pointsDisplay.textContent = points;
}

function buyClickUpgrade() {
    if (points >= 10) {
        points -= 10;
        clickMultiplier++;
        updatePointsDisplay();
    } else {
        alert("Not enough points!");
    }
}

function buyAutoClicker() {
    if (points >= 50) {
        points -= 50;
        autoClickers++;
        setInterval(autoClick, autoClickRate);
        updatePointsDisplay();
    } else {
        alert("Not enough points!");
    }
}

function autoClick() {
    points += clickMultiplier * autoClickers;
    updatePointsDisplay();
}

function buyAutoClickUpgrade() {
    if (points >= 100) {
        points -= 100;
        autoClickRate /= 2; // doubling the auto click speed
        updatePointsDisplay();
    } else {
        alert("Not enough points!");
    }
}

document.addEventListener("keydown", function(event) {
    if (event.key === "s") {
        toggleShop();
    }
});

function toggleShop() {
    if (shop.style.display === "none") {
        shop.style.display = "block";
    } else {
        shop.style.display = "none";
    }
}

</script>

</body>
</html>
